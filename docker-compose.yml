version: '3.8'

services:

  langchain-service:
    build: ./langchain-service
    expose:
      - "8000"
    env_file:
      - ./langchain-service/.env
  
  springboot-app:
    build: ./springboot-app
    ports:
      - "80:8080"
    depends_on:
      - langchain-service
    environment:
      - FASTAPI_URL=http://langchain-service:8000