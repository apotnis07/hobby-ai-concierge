<!DOCTYPE html>

<html class="dark" lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hobby-AI-Concierge | Sign In</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-background": "#e3e2e9",
                        "inverse-on-surface": "#2f3035",
                        "inverse-primary": "#5d5f5f",
                        "outline-variant": "#444748",
                        "surface-container-highest": "#34343a",
                        "surface": "#121318",
                        "inverse-surface": "#e3e2e9",
                        "primary-container": "#e2e2e2",
                        "surface-bright": "#38393e",
                        "background": "#121318",
                        "on-secondary-container": "#babcbd",
                        "tertiary-container": "#e4e2e1",
                        "on-primary-fixed-variant": "#454747",
                        "surface-dim": "#121318",
                        "error": "#ffb4ab",
                        "on-surface": "#e3e2e9",
                        "outline": "#8e9192",
                        "surface-variant": "#34343a",
                        "surface-tint": "#c6c6c7",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#2e3132",
                        "on-primary-fixed": "#1a1c1c",
                        "secondary": "#c5c7c8",
                        "on-tertiary": "#303030",
                        "on-tertiary-container": "#656464",
                        "on-primary-container": "#636565",
                        "secondary-fixed": "#e1e3e4",
                        "primary": "#ffffff",
                        "primary-fixed-dim": "#c6c6c7",
                        "surface-container-high": "#292a2f",
                        "surface-container-lowest": "#0d0e13",
                        "primary-fixed": "#e2e2e2",
                        "secondary-fixed-dim": "#c5c7c8",
                        "on-secondary-fixed-variant": "#454748",
                        "error-container": "#93000a",
                        "tertiary": "#ffffff",
                        "on-primary": "#2f3131",
                        "on-tertiary-fixed-variant": "#474747",
                        "surface-container-low": "#1a1b20",
                        "surface-container": "#1e1f24",
                        "tertiary-fixed": "#e4e2e1",
                        "on-tertiary-fixed": "#1b1c1c",
                        "secondary-container": "#494c4d",
                        "on-surface-variant": "#c4c7c8",
                        "on-error": "#690005",
                        "on-secondary-fixed": "#191c1d",
                        "tertiary-fixed-dim": "#c8c6c6"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .dot-grid {
            background-image: radial-gradient(circle, #444748 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.15;
        }

        .metallic-sheen {
            background: linear-gradient(45deg, #ffffff 0%, #c6c6c7 100%);
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col overflow-x-hidden">
    <!-- Hero Background Layer -->
    <div class="fixed inset-0 dot-grid pointer-events-none"></div>
    <main class="flex-grow flex items-center justify-center px-6 py-12 relative z-10">
        <div class="w-full max-w-[480px]">
            <!-- Logo Section -->
            <div class="flex flex-col items-center mb-12">
                <div
                    class="mb-6 flex items-center justify-center w-16 h-16 bg-surface-container-high rounded-full shadow-lg">
                    <span class="material-symbols-outlined text-primary text-3xl">terminal</span>
                </div>
                <h1 class="font-headline text-4xl md:text-5xl font-bold tracking-tighter text-white mb-2">Hobby-AI-Concierge</h1>
                <p class="font-body text-on-surface-variant text-sm tracking-wide">Enter your credentials to continue
                </p>
            </div>
            <!-- Login Form Container -->
            <div class="bg-surface-container-low rounded-lg p-1 w-full">
                <div class="bg-surface-container rounded-[calc(2rem-4px)] p-8 md:p-10">
                    <form th:action="@{/login}" class="space-y-8" method="post">
                        <!-- User Name Input -->
                        <div class="space-y-2">
                            <label
                                class="font-label text-[10px] uppercase font-bold tracking-widest text-on-surface-variant ml-1"
                                for="username">
                                User Name
                            </label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">person</span>
                                <input
                                    class="w-full bg-surface-container-high border-none rounded-full py-4 pl-12 pr-6 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-outline-variant transition-all duration-300"
                                    id="username" name="username" placeholder="developer_id" required="" type="text" />
                            </div>
                        </div>
                        <!-- Password Input -->
                        <div class="space-y-2">
                            <label
                                class="font-label text-[10px] uppercase font-bold tracking-widest text-on-surface-variant ml-1"
                                for="password">
                                Password
                            </label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
                                <input
                                    class="w-full bg-surface-container-high border-none rounded-full py-4 pl-12 pr-6 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-outline-variant transition-all duration-300"
                                    id="password" name="password" placeholder="••••••••" required="" type="password" />
                            </div>
                        </div>
                        <!-- Submit Button -->
                        <div class="pt-2">
                            <button
                                class="metallic-sheen w-full text-on-primary font-label font-bold py-4 rounded-full transition-all duration-300 hover:scale-[1.02] active:scale-95 shadow-[0_8px_30px_rgb(0,0,0,0.12)]"
                                type="submit">
                                Sign In
                            </button>
                        </div>
                    </form>
                    <!-- Footer Links within form card -->
                    <div class="mt-10 pt-8 border-t border-outline-variant/10 flex flex-col items-center gap-4">
                        <a class="text-xs font-label text-on-surface-variant hover:text-white transition-colors flex items-center gap-2 group"
                            href="/">
                            <span
                                class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                            Click here to go to the home page
                        </a>
                    </div>
                </div>
            </div>
            <!-- Error handling area (as per Spring Security style) -->
            <!-- Note: Spring context usually injects param.error here -->
            <div th:if="${param.error}">
                <div class="mt-8 px-4 opacity-0 animate-pulse">
                    <div class="flex items-center gap-3 text-error text-xs font-medium justify-center">
                        <span class="material-symbols-outlined text-sm" data-weight="fill">error</span>
                        Invalid username or password.
                    </div>
                </div>
            </div>
        </div>
    </main>

        class="w-full border-t border-white/5 bg-surface dark:bg-surface flex flex-col md:flex-row justify-between items-center px-8 py-12 mt-auto">

        </div>

            <a class="font-body text-xs tracking-wide text-gray-500 hover:text-white transition-colors"

            <a class="font-body text-xs tracking-wide text-gray-500 hover:text-white transition-colors"
                href="#">Terms</a>
            <a class="font-body text-xs tracking-wide text-gray-500 hover:text-white transition-colors"
                href="#">Security</a>
        </div>
    </footer> -->
</body>

</html>
