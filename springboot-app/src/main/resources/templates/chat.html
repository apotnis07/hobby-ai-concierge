    <script>
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const chatCanvas = document.getElementById('chat-canvas');
        const csrf = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', e => {
            if (e.key == 'Enter') sendMessage();
        });

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            chatCanvas.insertAdjacentHTML('beforeend', `
                <div class="flex justify-end">
                    <div class="bg-surface-container-high px-6 py-4 rounded-3xl rounded-tr-none max-w-lg border border-outline-variant/10">
                        <p class="text-on-surface text-sm leading-relaxed">${message}</p>
                    </div>
                </div>
            `);
            input.value = '';
            chatCanvas.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'end' });

            const loaderId = 'loader-' + Date.now();
            chatCanvas.insertAdjacentHTML('beforeend',`
                <div id="${loaderId}" class="flex justify-start items-center gap-3 animate-fade-in">
                    <div class="typing-indicator">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <span class="text-[10px] text-purple-300/50 uppercase tracking-widest font-bold">Atelier is thinking</span>
                </div>
            `);
            chatCanvas.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'end' });

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        [csrfHeader]: csrf
                    },
                    body: `message=${encodeURIComponent(message)}`
                });
                const reply = await response.text();
                const rawText = JSON.parse(reply).response;

                document.getElementById(loaderId).remove();

                // 3. FIX: Handle Markdown Bold and Newlines
                // This replaces **text** with <strong>text</strong> and \n with <br>
                const formattedText = rawText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                const cleanReply = formattedText.replace(/\n/g, '<br>');


                chatCanvas.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-start items-start gap-4">
                        <div class="w-8 h-8 rounded-full metallic-gradient flex items-center justify-center flex-shrink-0 mt-1">
                            <span class="material-symbols-outlined text-on-secondary text-lg">auto_awesome</span>
                        </div>
                        <div class="glass-panel p-6 rounded-3xl border border-outline-variant/20 max-w-lg">
                            <p class="text-on-surface text-sm leading-relaxed">${cleanReply}</p>
                        </div>
                    </div>
                `);

                chatCanvas.lastElementChild.scrollIntoView({ behavior: 'smooth' });
            } catch(error){
                // Remove loader even if there's an error
                if(document.getElementById(loaderId)) document.getElementById(loaderId).remove();
                console.error("Chat Error:", error);
            }
        }
    </script>
