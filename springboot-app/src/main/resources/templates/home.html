    <style>
        .dot-grid {
            background-image: radial-gradient(circle, #444748 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.15;
            /* This creates a "vignette" effect for the dots */
            mask-image: radial-gradient(circle, black 40%, transparent 90%);
            -webkit-mask-image: radial-gradient(circle, black 40%, transparent 90%);
        }

        .glass-panel {
            background: rgba(56, 57, 62, 0.6);
            backdrop-filter: blur(40px);
        }

        .signature-gradient {
            background: linear-gradient(45deg, #ffffff, #c6c6c7);
        }

        /* Deep Violet Gradient Background */
        .bg-violet-gradient {
            background: radial-gradient(circle at center, #1a1033 0%, #0d0e13 100%);
        }

        /* The Glow Pulse Animation */
        @keyframes glowPulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.3;
                filter: blur(80px);
            }

            50% {
                transform: scale(1.2);
                opacity: 0.6;
                filter: blur(100px);
            }
        }

        @keyframes topLeftGlow {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.2;
                filter: blur(60px);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.4;
                filter: blur(70px);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .bottom-glow {
            position: absolute;
            bottom: 0;
            /* Align to the actual bottom */
            left: 50%;
            transform: translate(-50%, 50%);
            /* Move it halfway down so it's a "horizon" glow */
            width: 600px;
            height: 300px;
            background: #4f46e5;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(80px);
            /* Add blur here if not in animation */
            animation: glowPulse 8s infinite ease-in-out;
        }

        .top-left-glow {
            position: absolute;
            top: 0;
            left: 15%;
            width: 400px;
            /* Sizing it slightly smaller */
            height: 400px;
            background: #c084fc;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            /* Note: Starts from 0%, ends at 100%, different timing */
            animation: topLeftGlow 12s infinite ease-in-out;
        }
    </style>
</head>
