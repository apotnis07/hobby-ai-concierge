<!DOCTYPE html>

<html class="dark" lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hobby-AI-Concierge - Welcome</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-background": "#e3e2e9",
                        "inverse-on-surface": "#2f3035",
                        "inverse-primary": "#5d5f5f",
                        "outline-variant": "#444748",
                        "surface-container-highest": "#34343a",
                        "surface": "#121318",
                        "inverse-surface": "#e3e2e9",
                        "primary-container": "#e2e2e2",
                        "surface-bright": "#38393e",
                        "background": "#121318",
                        "on-secondary-container": "#babcbd",
                        "tertiary-container": "#e4e2e1",
                        "on-primary-fixed-variant": "#454747",
                        "surface-dim": "#121318",
                        "error": "#ffb4ab",
                        "on-surface": "#e3e2e9",
                        "outline": "#8e9192",
                        "surface-variant": "#34343a",
                        "surface-tint": "#c6c6c7",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#2e3132",
                        "on-primary-fixed": "#1a1c1c",
                        "secondary": "#c5c7c8",
                        "on-tertiary": "#303030",
                        "on-tertiary-container": "#656464",
                        "on-primary-container": "#636565",
                        "secondary-fixed": "#e1e3e4",
                        "primary": "#ffffff",
                        "primary-fixed-dim": "#c6c6c7",
                        "surface-container-high": "#292a2f",
                        "surface-container-lowest": "#0d0e13",
                        "primary-fixed": "#e2e2e2",
                        "secondary-fixed-dim": "#c5c7c8",
                        "on-secondary-fixed-variant": "#454748",
                        "error-container": "#93000a",
                        "tertiary": "#ffffff",
                        "on-primary": "#2f3131",
                        "on-tertiary-fixed-variant": "#474747",
                        "surface-container-low": "#1a1b20",
                        "surface-container": "#1e1f24",
                        "tertiary-fixed": "#e4e2e1",
                        "on-tertiary-fixed": "#1b1c1c",
                        "secondary-container": "#494c4d",
                        "on-surface-variant": "#c4c7c8",
                        "on-error": "#690005",
                        "on-secondary-fixed": "#191c1d",
                        "tertiary-fixed-dim": "#c8c6c6"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        .dot-grid {
            background-image: radial-gradient(circle, #444748 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.15;
        }

        .glass-panel {
            background: rgba(56, 57, 62, 0.6);
            backdrop-filter: blur(40px);
        }

        .signature-gradient {
            background: linear-gradient(45deg, #ffffff, #c6c6c7);
        }
    </style>
</head>

<body
    class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary flex flex-col min-h-screen">
    <!-- TopNavBar (JSON Anchor) -->
    <header class="w-full top-0 sticky bg-[#121318] dark:bg-[#121318] z-50">
        <div class="flex justify-between items-center w-full px-8 py-6 max-w-[1440px] mx-auto">
            <div class="text-2xl font-bold tracking-tighter text-white font-['Space_Grotesk']">
                Hobby-AI-Concierge
            </div>
            <nav class="hidden md:flex items-center gap-8">
                <!-- <a class="font-['Space_Grotesk'] tracking-tight text-sm uppercase font-semibold text-white border-b-2 border-white pb-1" href="#">
                    Home
                </a>
<a class="font-['Space_Grotesk'] tracking-tight text-sm uppercase font-semibold text-gray-400 hover:text-white transition-colors" href="/hello">
                    Hello
                </a> -->
            </nav>
            <!-- <div class="flex items-center gap-4">
                <button
                    class="px-6 py-2 rounded-full signature-gradient text-on-primary font-['Inter'] text-xs tracking-wide font-semibold hover:shadow-[0_0_1rem_rgba(255,255,255,0.2)] transition-all duration-300 active:scale-95 opacity-80">
                    Logout
                </button>
            </div> -->
        </div>
        <div class="h-[1px] w-full bg-[#1a1b20]"></div>
    </header>
    <!-- Main Content Area -->
    <main class="relative flex-grow flex flex-col items-center justify-center px-6 overflow-hidden">
        <!-- Dot Grid Background -->
        <div class="absolute inset-0 dot-grid pointer-events-none"></div>
        <!-- Hero Section -->
        <section class="relative z-10 max-w-4xl w-full text-center py-24 md:py-48">
            <div class="mb-6 flex justify-center">
                <span
                    class="px-4 py-1.5 rounded-full bg-secondary-container text-on-secondary-container font-label text-[0.75rem] font-semibold tracking-widest uppercase">
                    Spring + LangChain Project
                </span>
            </div>
            <h1
                class="font-headline text-[3.5rem] md:text-[5rem] lg:text-[7rem] leading-[0.9] font-bold tracking-tight text-white mb-12">
                Welcome!
            </h1>
            <p class="font-body text-lg md:text-xl text-on-surface-variant max-w-2xl mx-auto mb-16 leading-relaxed">
                An AI-powered assistant that routes your hobby questions to the right expert and remembers your conversation across turns. Powered by LangChain, secured by Spring, and always ready to help.
            </p>
            <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                <a class="group relative px-8 py-4 rounded-full signature-gradient text-on-primary font-label font-bold flex items-center gap-3 transition-all duration-300 hover:shadow-[0_0_2rem_rgba(255,255,255,0.2)] active:scale-95"
                    th:href="@{/chat}">
                    Click here to get started
                    <span
                        class="material-symbols-outlined text-xl transition-transform duration-300 group-hover:translate-x-1">arrow_forward</span>
                </a>
            </div>
        </section>
        <!-- Decorative Elements -->
        <div
            class="absolute bottom-0 left-0 w-full h-64 bg-gradient-to-t from-surface to-transparent pointer-events-none">
        </div>
    </main>
    <!-- Footer (JSON Anchor) -->
</body>

</html>
